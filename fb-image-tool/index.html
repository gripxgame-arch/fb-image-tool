<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Post Image Generator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f0f0f;
  color: #e0e0e0;
  min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, #1877F2 0%, #0a5dc2 100%);
  padding: 20px 30px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header svg { width: 32px; height: 32px; fill: white; }
.header h1 { font-size: 20px; font-weight: 600; color: white; }
.header .badge {
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 500;
}
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 30px 20px;
}
.section-title {
  font-size: 14px;
  font-weight: 600;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}

/* Template Grid */
.templates {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 36px;
}
.tpl-card {
  background: #1a1a1a;
  border: 2px solid #2a2a2a;
  border-radius: 12px;
  padding: 18px 16px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.tpl-card:hover { border-color: #1877F2; background: #1f1f2f; }
.tpl-card.active { border-color: #1877F2; background: #1a2540; box-shadow: 0 0 20px rgba(24,119,242,0.15); }
.tpl-icon { font-size: 36px; margin-bottom: 10px; }
.tpl-name { font-size: 14px; font-weight: 600; color: #fff; }
.tpl-desc { font-size: 11px; color: #888; margin-top: 4px; line-height: 1.4; }

/* Form */
.form-panel {
  background: #1a1a1a;
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 30px;
  display: none;
}
.form-panel.visible { display: block; }
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label {
  font-size: 13px;
  font-weight: 500;
  color: #aaa;
}
.form-group input,
.form-group textarea,
.form-group select {
  background: #0f0f0f;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 12px 14px;
  color: #fff;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  border-color: #1877F2;
}
.form-group textarea { resize: vertical; min-height: 70px; }
.form-group select { cursor: pointer; }

.style-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.chip {
  background: #0f0f0f;
  border: 1px solid #333;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  color: #ccc;
  cursor: pointer;
  transition: all 0.2s;
}
.chip:hover { border-color: #1877F2; }
.chip.active { background: #1877F2; border-color: #1877F2; color: white; }

/* Generate Button */
.btn-generate {
  background: linear-gradient(135deg, #1877F2, #0d65d1);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 16px 40px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 22px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-generate:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(24,119,242,0.3); }
.btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

/* Result */
.result-panel {
  display: none;
  background: #1a1a1a;
  border-radius: 16px;
  padding: 28px;
  text-align: center;
}
.result-panel.visible { display: block; }
.result-img-wrap {
  background: #111;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
  display: inline-block;
  max-width: 100%;
}
.result-img-wrap img {
  max-width: 100%;
  height: auto;
  display: block;
}
.result-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.btn-secondary {
  background: #2a2a2a;
  color: #ccc;
  border: 1px solid #444;
  border-radius: 10px;
  padding: 12px 24px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-secondary:hover { background: #333; color: white; }

/* Loading */
.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 20px;
}
.loading-overlay.visible { display: flex; }
.spinner {
  width: 48px; height: 48px;
  border: 3px solid #333;
  border-top-color: #1877F2;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #aaa; font-size: 14px; }

/* Prompt Preview */
.prompt-preview {
  background: #0f0f0f;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 12px;
  color: #888;
  line-height: 1.5;
  margin-top: 8px;
  max-height: 100px;
  overflow-y: auto;
}

@media (max-width: 640px) {
  .form-grid { grid-template-columns: 1fr; }
  .templates { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="header">
  <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
  <h1>FB Post Image Generator</h1>
  <span class="badge">Marketing Tool</span>
</div>

<div class="container">

  <!-- Step 1: Choose Template -->
  <div class="section-title">第一步 · 选择模板</div>
  <div class="templates" id="templateGrid">
    <div class="tpl-card" data-tpl="product" onclick="selectTemplate('product')">
      <div class="tpl-icon">📦</div>
      <div class="tpl-name">产品展示</div>
      <div class="tpl-desc">突出产品卖点，吸引眼球</div>
    </div>
    <div class="tpl-card" data-tpl="promo" onclick="selectTemplate('promo')">
      <div class="tpl-icon">🔥</div>
      <div class="tpl-name">促销活动</div>
      <div class="tpl-desc">折扣、限时优惠、清仓</div>
    </div>
    <div class="tpl-card" data-tpl="brand" onclick="selectTemplate('brand')">
      <div class="tpl-icon">💡</div>
      <div class="tpl-name">品牌故事</div>
      <div class="tpl-desc">传递品牌理念与价值观</div>
    </div>
    <div class="tpl-card" data-tpl="quiz" onclick="selectTemplate('quiz')">
      <div class="tpl-icon">❓</div>
      <div class="tpl-name">互动问答</div>
      <div class="tpl-desc">引导评论，提升互动率</div>
    </div>
    <div class="tpl-card" data-tpl="holiday" onclick="selectTemplate('holiday')">
      <div class="tpl-icon">🎉</div>
      <div class="tpl-name">节日活动</div>
      <div class="tpl-desc">节日营销、周年庆、主题活动</div>
    </div>
  </div>

  <!-- Step 2: Fill in Details -->
  <div class="form-panel" id="formPanel">
    <div class="section-title">第二步 · 填写内容</div>
    <div id="formContent"></div>

    <div class="section-title" style="margin-top:24px">视觉风格</div>
    <div class="style-chips" id="styleChips">
      <span class="chip active" data-style="modern minimal">现代简约</span>
      <span class="chip" data-style="vibrant colorful">鲜艳多彩</span>
      <span class="chip" data-style="luxury elegant">高端优雅</span>
      <span class="chip" data-style="tech futuristic">科技未来</span>
      <span class="chip" data-style="warm cozy">温馨亲切</span>
      <span class="chip" data-style="bold impactful">大胆醒目</span>
      <span class="chip" data-style="clean corporate">商务专业</span>
      <span class="chip" data-style="playful fun">活泼趣味</span>
    </div>

    <div class="form-group full" style="margin-top:18px">
      <label>🇺🇸 补充描述（英文，可选 — 让AI更好地理解你的需求）</label>
      <input type="text" id="extraPrompt" placeholder="e.g. blue and white color scheme, tropical theme, luxury gold accents...">
    </div>

    <div class="form-group full">
      <label>📝 AI 提示词预览（自动生成，可手动修改）</label>
      <div class="prompt-preview" id="promptPreview" contenteditable="true">选择模板并填写内容后，这里会自动生成提示词...</div>
    </div>

    <button class="btn-generate" id="btnGenerate" onclick="generateImage()">
      <span>✨</span> 生成图片
    </button>
  </div>

  <!-- Step 3: Result -->
  <div class="result-panel" id="resultPanel">
    <div class="section-title">生成结果</div>
    <div class="result-img-wrap">
      <img id="resultImage" src="" alt="Generated Image">
    </div>
    <div class="result-actions">
      <a class="btn-secondary" id="btnDownload" href="" download="fb-post.png">
        ⬇️ 下载图片
      </a>
      <button class="btn-secondary" onclick="regenerate()">
        🔄 重新生成
      </button>
      <button class="btn-secondary" onclick="resetAll()">
        ➕ 新建一张
      </button>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">AI 正在生成图片，预计 10-30 秒...</div>
</div>

<script>
// ============ Template Definitions ============
const TEMPLATES = {
  product: {
    name: '产品展示',
    fields: [
      { id: 'productName', label: '产品名称', placeholder: 'e.g. Smart Watch Pro', type: 'text' },
      { id: 'productFeature', label: '核心卖点', placeholder: 'e.g. 7-day battery life, GPS tracking', type: 'textarea' },
      { id: 'targetAudience', label: '目标受众', placeholder: 'e.g. fitness enthusiasts, young professionals', type: 'text' }
    ],
    buildPrompt: (d, style) => `A professional Facebook marketing banner image for showcasing "${d.productName}". Key features: ${d.productFeature}. Target audience: ${d.targetAudience}. Style: ${style}. High quality product photography feel, clean layout with space for text overlay. Facebook landscape format, eye-catching and scroll-stopping. ${d.extra}`
  },
  promo: {
    name: '促销活动',
    fields: [
      { id: 'discount', label: '优惠信息', placeholder: 'e.g. 50% OFF, Buy 1 Get 1 Free', type: 'text' },
      { id: 'productName', label: '产品/品牌名', placeholder: 'e.g. Summer Collection 2026', type: 'text' },
      { id: 'urgency', label: '紧迫感文案', placeholder: 'e.g. Limited Time Only, Ends Sunday', type: 'text' }
    ],
    buildPrompt: (d, style) => `An attention-grabbing Facebook promotional banner. Big bold text "${d.discount}" for "${d.productName}". Urgency text: "${d.urgency}". Style: ${style}. Sale, discount marketing feel. Bold colors, dynamic composition, designed to drive clicks. Facebook landscape format. ${d.extra}`
  },
  brand: {
    name: '品牌故事',
    fields: [
      { id: 'brandName', label: '品牌名称', placeholder: 'e.g. EcoLife', type: 'text' },
      { id: 'brandValue', label: '品牌理念/价值观', placeholder: 'e.g. Sustainable living, quality first', type: 'textarea' },
      { id: 'mood', label: '想要传达的情绪', placeholder: 'e.g. trust, inspiration, warmth', type: 'text' }
    ],
    buildPrompt: (d, style) => `A Facebook brand storytelling banner for "${d.brandName}". The brand stands for: ${d.brandValue}. Emotional tone: ${d.mood}. Style: ${style}. Cinematic and emotional, tells a visual story. Elegant composition, suitable for brand awareness post. Facebook landscape format. ${d.extra}`
  },
  quiz: {
    name: '互动问答',
    fields: [
      { id: 'question', label: '问题内容', placeholder: 'e.g. Which color do you prefer?', type: 'text' },
      { id: 'topic', label: '话题/主题', placeholder: 'e.g. new product colors, summer plans', type: 'text' },
      { id: 'options', label: '选项（逗号分隔）', placeholder: 'e.g. Red, Blue, Green, Black', type: 'text' }
    ],
    buildPrompt: (d, style) => `An engaging Facebook interactive poll/quiz banner. Question: "${d.question}" about ${d.topic}. Visual options representation for: ${d.options}. Style: ${style}. Fun, inviting, encourages comments and engagement. Split layout showing choices. Facebook landscape format. ${d.extra}`
  },
  holiday: {
    name: '节日活动',
    fields: [
      { id: 'holiday', label: '节日/活动名称', placeholder: 'e.g. Christmas, Chinese New Year, Black Friday', type: 'text' },
      { id: 'greeting', label: '祝福/活动主题', placeholder: 'e.g. Merry Christmas & Happy New Year Sale', type: 'text' },
      { id: 'specialOffer', label: '特别优惠（可选）', placeholder: 'e.g. Free shipping on all orders', type: 'text' }
    ],
    buildPrompt: (d, style) => `A festive Facebook banner for "${d.holiday}". Main text: "${d.greeting}". Special offer: ${d.specialOffer || 'None'}. Style: ${style}. Festive, celebratory atmosphere with appropriate holiday elements. Joyful and shareable. Facebook landscape format. ${d.extra}`
  }
};

let currentTemplate = null;
let currentStyle = 'modern minimal';
let lastPrompt = '';

// ============ UI Functions ============
function selectTemplate(tplId) {
  currentTemplate = tplId;

  // Update cards
  document.querySelectorAll('.tpl-card').forEach(c => c.classList.remove('active'));
  document.querySelector(`[data-tpl="${tplId}"]`).classList.add('active');

  // Build form
  const tpl = TEMPLATES[tplId];
  let html = '<div class="form-grid">';
  tpl.fields.forEach(f => {
    html += `<div class="form-group${f.type === 'textarea' ? ' full' : ''}">
      <label>${f.label}</label>
      ${f.type === 'textarea'
        ? `<textarea id="field_${f.id}" placeholder="${f.placeholder}" oninput="updatePreview()"></textarea>`
        : `<input type="text" id="field_${f.id}" placeholder="${f.placeholder}" oninput="updatePreview()">`
      }
    </div>`;
  });
  html += '</div>';
  document.getElementById('formContent').innerHTML = html;

  // Show form
  document.getElementById('formPanel').classList.add('visible');
  document.getElementById('resultPanel').classList.remove('visible');

  updatePreview();
}

// Style chips
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentStyle = chip.dataset.style;
    updatePreview();
  });
});

function getFieldValues() {
  const tpl = TEMPLATES[currentTemplate];
  const data = {};
  tpl.fields.forEach(f => {
    const el = document.getElementById(`field_${f.id}`);
    data[f.id] = el ? el.value : '';
  });
  data.extra = document.getElementById('extraPrompt') ? document.getElementById('extraPrompt').value : '';
  return data;
}

function updatePreview() {
  if (!currentTemplate) return;
  const tpl = TEMPLATES[currentTemplate];
  const data = getFieldValues();
  const prompt = tpl.buildPrompt(data, currentStyle);
  lastPrompt = prompt;
  document.getElementById('promptPreview').textContent = prompt;
}

// ============ Generate ============
async function generateImage() {
  if (!currentTemplate) return;

  // Get prompt (may be manually edited)
  const prompt = document.getElementById('promptPreview').textContent.trim();
  if (!prompt) return alert('请填写内容');

  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  document.getElementById('loadingOverlay').classList.add('visible');

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();

    if (data.error) {
      alert('生成失败: ' + (data.detail || data.error));
    } else if (data.imageUrl) {
      document.getElementById('resultImage').src = data.imageUrl;
      document.getElementById('btnDownload').href = data.imageUrl;
      document.getElementById('resultPanel').classList.add('visible');
      document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth' });
    }
  } catch (e) {
    alert('网络错误: ' + e.message);
  } finally {
    btn.disabled = false;
    document.getElementById('loadingOverlay').classList.remove('visible');
  }
}

function regenerate() {
  generateImage();
}

function resetAll() {
  currentTemplate = null;
  document.querySelectorAll('.tpl-card').forEach(c => c.classList.remove('active'));
  document.getElementById('formPanel').classList.remove('visible');
  document.getElementById('resultPanel').classList.remove('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

</body>
</html>
